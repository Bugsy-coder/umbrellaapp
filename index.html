<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umbrella & Translink Map</title>
    <style>
        :root { --bg: #1a1a1a; --card: rgba(255, 255, 255, 0.1); --text: #ffffff; --accent: #00d2ff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; text-align: center;
            transition: background-color 1s; overflow-x: hidden;
        }
        #main-card { 
            margin-top: 20px; z-index: 10; width: 95%; max-width: 400px;
            background: var(--card); padding: 25px; border-radius: 24px; 
            backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        #answer { font-size: 5.5rem; font-weight: 800; margin: 15px 0; }
        #details { font-size: 0.95rem; opacity: 0.8; margin-bottom: 20px; white-space: pre-wrap; }
        
        .stop-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; margin: 10px 0; background: rgba(255,255,255,0.05); 
            border-radius: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.1);
        }
        .stop-info { display: flex; align-items: center; cursor: pointer; flex-grow: 1; }
        .stop-icon { font-size: 1.8rem; margin-right: 15px; }
        .stop-name { font-weight: 600; font-size: 1rem; color: #fff; text-decoration: none; }
        .map-link { 
            background: var(--accent); color: #000; padding: 6px 12px; 
            border-radius: 8px; font-size: 0.75rem; font-weight: bold; 
            text-decoration: none; margin-left: 10px;
        }
        
        #reset-btn { background: #fff; color: #000; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #weather-effects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .drop { position: absolute; background: rgba(255,255,255,0.4); width: 2px; height: 25px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .sun { position: absolute; top: -50px; right: -50px; width: 250px; height: 250px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 80px #FF8C00; }
    </style>
</head>
<body>
    <div id="weather-effects"></div> 
    <div id="main-card">
        <h1 id="title">Brisbane Commuter</h1>
        <p id="answer">⌛</p>
        <p id="details">Locating...</p>
        <div id="stops-list"></div>
        <button id="reset-btn" style="display:none;" onclick="location.reload()">Reset</button>
    </div>

    <script>
        let userLat, userLon;
        const list = document.getElementById('stops-list');

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function selectStop(name, stopLat, stopLon) {
            const dist = getDistance(userLat, userLon, stopLat, stopLon);
            const walkTime = Math.round((dist / 5) * 60); 
            document.getElementById('title').innerText = `Verdict`;
            list.innerHTML = `<a href="https://www.google.com/maps/dir/?api=1&destination=${stopLat},${stopLon}&travelmode=walking" target="_blank" class="map-link" style="font-size:1rem; padding:15px; display:block; text-align:center;">Open in Google Maps</a>`;
            document.getElementById('reset-btn').style.display = "inline-block";
            
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${userLat}&longitude=${userLon}&hourly=precipitation_probability&forecast_hours=1&timezone=auto`;
            const res = await fetch(weatherUrl);
            const data = await res.json();
            const rainProb = data.hourly.precipitation_probability[0];

            document.getElementById('answer').innerText = rainProb >= 25 ? "YES ☔" : "NO 🕶️";
            document.body.style.backgroundColor = rainProb >= 25 ? "#2c3e50" : "#87CEEB";
            if(rainProb >= 25) startRain();
            document.getElementById('details').innerText = `${name}\n${walkTime} min walk (${(dist*1000).toFixed(0)}m)\nRain Probability: ${rainProb}%`;
        }

        async function getTranslinkStops(lat, lon) {
            userLat = lat; userLon = lon;
            const radius = 0.01; 
            // Added outSR=4326 to get GPS coordinates back from the Gov server
            const url = `https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Transportation/OtherTransport/MapServer/identify?geometry=${lon},${lat}&geometryType=esriGeometryPoint&sr=4326&layers=all&tolerance=15&mapExtent=${lon-radius},${lat-radius},${lon+radius},${lat+radius}&imageDisplay=800,600,96&returnGeometry=true&f=pjson&outSR=4326`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (!data.results || data.results.length === 0) {
                    document.getElementById('details').innerText = "No stops found."; return;
                }

                document.getElementById('answer').innerText = "🚏";
                document.getElementById('details').innerText = "Select a stop:";
                list.innerHTML = data.results.slice(0, 6).map(item => {
                    const name = item.attributes['Stop name'] || item.attributes['Name'] || "Stop";
                    const sLat = item.geometry.y; const sLon = item.geometry.x;
                    const d = getDistance(userLat, userLon, sLat, sLon);
                    const mapUrl = `
